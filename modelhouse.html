      justify-content: space-between;
      position: sticky;
      top: 0;

    .top-bar-left { display: flex; align-items: center; gap: 15px; }

    .back-btn:hover { background: rgba(255,255,255,0.25); }
    .top-bar-title { color: var(--white); font-size: 1rem; font-weight: 700; }

    }
    .page-header h1 {
      position: relative; color: var(--white); font-size: 2rem; font-weight: 900; margin-bottom: 10px;
    }
    .page-header p {
      position: relative; color: rgba(255,255,255,0.7); font-size: 0.95rem;
    }

    /* ===== TYPE TABS ===== */
    .tabs-wrapper {
      max-width: 1100px; margin: 0 auto; padding: 0 20px;
    }
    .tab-nav {
      display: flex; gap: 0; margin-top: -25px; position: relative; z-index: 10;
      background: var(--white); border-radius: 12px 12px 0 0;
      box-shadow: var(--shadow); overflow: hidden;
    }
    .tab-btn {
      flex: 1; padding: 16px 10px; border: none; background: var(--white);
      font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700;
      color: var(--gray); cursor: pointer; transition: all 0.3s ease;
      border-bottom: 3px solid transparent; position: relative;
    }
    .tab-btn:hover { background: var(--beige); color: var(--navy); }
    .tab-btn.active {
      color: var(--orange); border-bottom-color: var(--orange);
      background: var(--beige);
    }
    .tab-btn .tab-count {
      display: block; font-size: 0.72rem; font-weight: 500; color: var(--gray); margin-top: 2px;
    }
    .tab-btn.active .tab-count { color: var(--orange-warm); }

    /* ===== TAB CONTENT ===== */
    .tab-content-area {
      max-width: 1100px; margin: 0 auto; padding: 0 20px 80px;
    }
    .tab-panel {
      display: none;
      background: var(--white);
      border-radius: 0 0 16px 16px;
      padding: 30px clamp(16px, 3vw, 30px) 40px;
      box-shadow: var(--shadow);
    }
    .tab-panel.active { display: block; }

    /* ===== ROOM NAV (jump links) ===== */
    .room-nav {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 30px; padding-bottom: 20px;
      border-bottom: 1px dashed var(--beige-dark);
    }
    .room-nav a {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--beige); color: var(--navy);
      text-decoration: none; font-size: 0.82rem; font-weight: 600;
      padding: 7px 13px; border-radius: 999px;
      transition: all 0.2s ease;
    }
    .room-nav a:hover { background: var(--orange); color: var(--white); }

    /* ===== ROOM SECTION ===== */

    .room-section:last-child { margin-bottom: 0; }
    .room-section h2 {
      font-size: 1.1rem; font-weight: 900; color: var(--navy);
      margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .room-section h2 .icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: var(--white); border-radius: 9px; font-size: 0.95rem;
    }
    .room-section h2 .count {
      font-size: 0.8rem; font-weight: 500; color: var(--gray);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .photo-cell {
      cursor: pointer;
      border-radius: 10px;
      overflow: hidden;
      background: var(--beige);
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
      position: relative;
    }
    .photo-cell:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .photo-cell img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block;
    }
    .photo-cell .cap {
      padding: 7px 9px; font-size: 0.74rem; color: var(--navy); font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .photo-cell.option { box-shadow: 0 0 0 2px var(--orange-warm), var(--shadow); }
    .opt-badge {

      background: var(--orange); color: var(--white);
      font-size: 0.62rem; font-weight: 800; letter-spacing: 0.03em;
      padding: 2px 7px; border-radius: 999px;
    }

    .option-divider {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 10px;
      margin: 4px 0 -2px;
      color: var(--orange-dark); font-size: 0.78rem; font-weight: 700;
    }
    .option-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--orange-light); opacity: 0.4;
    }

    /* ===== LIGHTBOX MODAL ===== */

      background: rgba(13,27,40,0.94);
      z-index: 1000; align-items: center; justify-content: center; padding: 20px;

    .lb-inner {

      width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem;

    .lb-nav-btn.prev { left: -10px; }
    .lb-nav-btn.next { right: -10px; }
    @media (max-width: 768px) {
      .lb-nav-btn.prev { left: 2px; }

    const roomMeta = {
      entrance:     { label: '현관',        icon: 'fa-door-open' },
      living:       { label: '거실',        icon: 'fa-couch' },
      kitchen:      { label: '주방',        icon: 'fa-utensils' },
      bedroom1:     { label: '침실1',       icon: 'fa-bed' },
      bedroom2:     { label: '침실2',       icon: 'fa-bed' },
      'bath-bedroom': { label: '침실 화장실', icon: 'fa-bath' },
      'bath-common':  { label: '공용 화장실', icon: 'fa-bath' },
      laundry:      { label: '세탁실',      icon: 'fa-tshirt' },
      hallway:      { label: '복도',        icon: 'fa-shoe-prints' },
      alpharoom:    { label: '알파룸',      icon: 'fa-plus' },
      common:       { label: '공통 (도어락 · 에어컨 옵션)', icon: 'fa-key' }
    };
    const roomOrder = ['entrance','living','kitchen','bedroom1','bedroom2','bath-bedroom','bath-common','laundry','hallway','alpharoom','common'];

    let currentGallery = [];
    let currentIndex = 0;

    function typeTotalCount(type) {
      return Object.values(manifest[type]).reduce((sum, arr) => sum + arr.length, 0);
    }

    function buildTypePanel(type) {
      const panel = document.getElementById('typePanel-' + type);
      const rooms = roomOrder.filter(r => manifest[type][r]);

      const nav = document.createElement('div');
      nav.className = 'room-nav';
      rooms.forEach(r => {
        const a = document.createElement('a');
        a.href = '#' + type + '-' + r;
        a.innerHTML = '<i class="fas ' + roomMeta[r].icon + '"></i> ' + roomMeta[r].label + ' (' + manifest[type][r].length + ')';
        nav.appendChild(a);
      });
      panel.appendChild(nav);

      rooms.forEach(r => {
        const items = manifest[type][r];
        const section = document.createElement('div');
        section.className = 'room-section';
        section.id = type + '-' + r;

        const h2 = document.createElement('h2');
        h2.innerHTML = '<span class="icon"><i class="fas ' + roomMeta[r].icon + '"></i></span> ' +
          roomMeta[r].label + ' <span class="count">(' + items.length + '장)</span>';
        section.appendChild(h2);

        const grid = document.createElement('div');
        grid.className = 'photo-grid';

        let optionDividerAdded = false;
        items.forEach((item, idx) => {
          if (item.option && !optionDividerAdded) {
            const div = document.createElement('div');
            div.className = 'option-divider';
            div.innerHTML = '<i class="fas fa-star"></i> 옵션 적용 사진';
            grid.appendChild(div);
            optionDividerAdded = true;
          }
          const cell = document.createElement('div');
          cell.className = 'photo-cell' + (item.option ? ' option' : '');
          cell.onclick = () => openLightbox(type, r, idx);
          cell.innerHTML = (item.option ? '<span class="opt-badge">OPTION</span>' : '') +
            '<img src="' + item.file + '" alt="' + item.caption + '" loading="lazy">' +
            '<div class="cap">' + item.caption + '</div>';
          grid.appendChild(cell);
        });

        section.appendChild(grid);
        panel.appendChild(section);
      });
    }

    ['51A', '55B'].forEach(type => {
      document.getElementById('typeCount-' + type).textContent = '(' + typeTotalCount(type) + '장)';
      buildTypePanel(type);
    });

    function switchType(type) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('typeTab-' + type).classList.add('active');
      document.getElementById('typePanel-' + type).classList.add('active');
    }

    function openLightbox(type, room, idx) {
      currentGallery = manifest[type][room];
      currentIndex = idx;
      document.getElementById('lbModal').classList.add('active');
      document.body.style.overflow = 'hidden';
      updateLightbox(roomMeta[room].label);
    }

    function updateLightbox(roomLabel) {
      const item = currentGallery[currentIndex];
      document.getElementById('lbImg').src = item.file;
      document.getElementById('lbTitle').innerHTML = (roomLabel || '') + ' — ' + item.caption +
        (item.option ? ' <span class="opt-badge">OPTION</span>' : '');
      document.getElementById('lbCounter').textContent = (currentIndex + 1) + ' / ' + currentGallery.length;
    }

    function navLightbox(dir) {
      const len = currentGallery.length;
      currentIndex = (currentIndex + dir + len) % len;
      const title = document.getElementById('lbTitle').textContent.split(' — ')[0];
      updateLightbox(title);
    }

    function closeLightbox() {
      document.getElementById('lbModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('lbModal').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lbModal').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navLightbox(-1);
      if (e.key === 'ArrowRight') navLightbox(1);
    });
  </script>
